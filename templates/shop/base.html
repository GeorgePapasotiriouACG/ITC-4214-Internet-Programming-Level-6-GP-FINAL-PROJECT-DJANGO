<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<nav class="bg-white shadow p-4 flex justify-between">
    <div class="font-bold text-xl">My Modern E-Shop</div>
    <div>
        <a href="{% url 'shop:home' %}" class="px-3 py-1 hover:text-blue-500">Home</a>
        <a href="{% url 'shop:place_order' %}" class="px-3 py-1 hover:text-blue-500">Order</a>
    </div>
</nav>

<div class="container mx-auto py-6">
    {% block content %}{% endblock %}
</div>

</body>
</html>
