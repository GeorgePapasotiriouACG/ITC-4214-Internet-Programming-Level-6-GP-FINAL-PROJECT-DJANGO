{% extends "base.html" %}

{% block content %}

<h1>Products</h1>

<div class="products">

{% for product in products %}

<div class="card">

<img src="{{ product.image }}">

<h3>{{ product.name }}</h3>

<p>{{ product.price }} €</p>

<a href="/product/{{product.id}}/">View</a>

</div>

{% endfor %}

</div>

{% endblock %}
