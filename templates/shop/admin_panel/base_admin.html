{% extends "shop/base.html" %}

{% block content %}
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" aria-label="Admin navigation">
    <div class="admin-sidebar-title">Admin Panel</div>
    <nav>
      <a href="{% url 'shop:admin_dashboard' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="{% url 'shop:admin_products' %}" class="admin-nav-link {% if 'admin_product' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 7H4a2 2 0 00-2 2v9a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        Products
      </a>
      <a href="{% url 'shop:admin_categories' %}" class="admin-nav-link {% if 'admin_categor' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Categories
      </a>
      <a href="{% url 'shop:admin_users' %}" class="admin-nav-link {% if 'admin_user' in request.resolver_match.url_name or 'admin_approve' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Users
      </a>
      <a href="{% url 'shop:admin_orders' %}" class="admin-nav-link {% if 'admin_order' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Orders
      </a>
      <a href="{% url 'shop:admin_product_performance' %}" class="admin-nav-link {% if 'product_performance' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Performance
      </a>
      <a href="{% url 'shop:admin_search_logs' %}" class="admin-nav-link {% if 'search_logs' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search Logs
      </a>
      <a href="{% url 'shop:admin_audit_log' %}" class="admin-nav-link {% if 'audit_log' in request.resolver_match.url_name %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Audit Log
      </a>
      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid rgba(255,255,255,.12)">
        <a href="{% url 'shop:home' %}" class="admin-nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          Back to Store
        </a>
      </div>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="admin-main" id="main-content" tabindex="-1">
    {% block admin_content %}{% endblock %}
  </main>
</div>
{% endblock %}
