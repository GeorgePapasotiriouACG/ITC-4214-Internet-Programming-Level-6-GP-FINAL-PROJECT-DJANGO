{% extends "shop/base.html" %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Place Your Order</h1>

<form method="post" class="space-y-4 bg-white p-6 rounded shadow">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Your Name" class="w-full p-2 border rounded" required>
    <input type="email" name="email" placeholder="Email" class="w-full p-2 border rounded" required>
    <textarea name="address" placeholder="Address" class="w-full p-2 border rounded" required></textarea>

    <h2 class="font-bold text-xl mb-2">Select Products</h2>
    {% for product in products %}
        <label class="flex items-center space-x-2">
            <input type="checkbox" name="products" value="{{ product.id }}">
            <span>{{ product.name }} - ${{ product.price }}</span>
        </label>
    {% endfor %}

    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Submit Order</button>
</form>
{% endblock %}
